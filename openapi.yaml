openapi: 3.0.3
info:
  title: Datamio Audio API
  description: |
    FastAPI endpoint for uploading multi-domain audio datasets to Hugging Face with audio splitting capabilities.

    ## Authentication

    All API endpoints (except `GET /`) require an API key passed in the `X-API-Key` header.

    ### Key Types

    | Key Type | Source | Capabilities |
    |----------|--------|--------------|
    | Admin Key | `ADMIN_API_KEY` environment variable | Full access + can create/manage API keys |
    | User Key | Generated via `POST /api/keys` | Access all endpoints except key creation |

    ### Usage

    Include the API key in your request headers:
    ```
    X-API-Key: your-api-key-here
    ```
  version: 1.0.0

servers:
  - url: http://localhost:8001
    description: Local development server

tags:
  - name: Health
    description: API health check
  - name: Splits (Sync)
    description: Synchronous audio splitting operations
  - name: Splits (Async)
    description: Asynchronous audio splitting jobs
  - name: Hugging Face
    description: Dataset upload to Hugging Face
  - name: API Key Management
    description: Create and manage API keys

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for authentication. Set ADMIN_API_KEY env var for admin access.

  schemas:
    SplitsRequest:
      type: object
      required:
        - audio_url
      properties:
        audio_url:
          type: string
          format: uri
          description: URL to the audio file
          example: https://example.com/audio.wav
        output_folder:
          type: string
          default: audio_chunks
          description: Output folder for audio chunks
        threshold:
          type: number
          format: float
          default: 0.5
          description: Voice activity detection threshold (0-1)
        min_speech_duration_ms:
          type: integer
          default: 250
          description: Minimum speech duration in milliseconds
        min_silence_duration_ms:
          type: integer
          default: 100
          description: Minimum silence duration in milliseconds
        speech_pad_ms:
          type: integer
          default: 30
          description: Speech padding in milliseconds
        output_format:
          type: string
          default: wav
          description: Output audio format
          enum:
            - wav
            - mp3
            - flac
        return_absolute_paths:
          type: boolean
          default: false
          description: Return absolute file paths instead of relative
        webhookUrl:
          type: string
          format: uri
          nullable: true
          description: URL to receive webhook notifications for job status changes
          example: https://example.com/webhook
        transcription:
          type: boolean
          default: false
          description: Enable transcription of audio chunks using OpenAI Whisper
        open_ai_key:
          type: string
          nullable: true
          description: OpenAI API key for transcription (required if transcription is enabled)
          example: sk-...

    BatchSplitsRequest:
      type: object
      required:
        - audio_urls
      properties:
        audio_urls:
          type: array
          items:
            type: string
            format: uri
          description: List of URLs to audio files
          example:
            - https://example.com/audio1.wav
            - https://example.com/audio2.wav
        output_base_folder:
          type: string
          default: processed_audio
          description: Base output folder for processed audio
        threshold:
          type: number
          format: float
          default: 0.5
          description: Voice activity detection threshold (0-1)
        min_speech_duration_ms:
          type: integer
          default: 250
          description: Minimum speech duration in milliseconds
        min_silence_duration_ms:
          type: integer
          default: 100
          description: Minimum silence duration in milliseconds
        speech_pad_ms:
          type: integer
          default: 30
          description: Speech padding in milliseconds
        output_format:
          type: string
          default: wav
          description: Output audio format
        return_absolute_paths:
          type: boolean
          default: false
          description: Return absolute file paths instead of relative
        webhookUrl:
          type: string
          format: uri
          nullable: true
          description: URL to receive webhook notifications for job status changes
          example: https://example.com/webhook
        transcription:
          type: boolean
          default: false
          description: Enable transcription of audio chunks using OpenAI Whisper
        open_ai_key:
          type: string
          nullable: true
          description: OpenAI API key for transcription (required if transcription is enabled)
          example: sk-...

    AudioDatasetItem:
      type: object
      required:
        - id
        - text
        - audio
        - nature
        - language
        - domain
      properties:
        id:
          type: string
          description: Unique identifier for the audio sample
          example: sample-001
        text:
          type: string
          description: Transcript of the audio
          example: This is the transcript of the audio
        audio:
          type: string
          format: uri
          description: URL to the audio file
          example: https://example.com/audio.wav
        speaker_id:
          type: string
          nullable: true
          description: Speaker identifier
          example: speaker_01
        nature:
          type: string
          description: Nature of the audio (natural/synthetic)
          example: natural
        language:
          type: string
          description: Language code
          example: en
        domain:
          type: string
          description: Domain category
          example: general

    UploadAudioDatasetRequest:
      type: object
      required:
        - dataset
        - datasetName
        - token
      properties:
        dataset:
          type: array
          items:
            $ref: '#/components/schemas/AudioDatasetItem'
          description: Array of audio dataset items
        datasetName:
          type: string
          description: Name for the Hugging Face dataset
          example: my-audio-dataset
        token:
          type: string
          description: Hugging Face API token
          example: hf_your_token_here
        isPrivate:
          type: integer
          default: 0
          description: Whether the dataset should be private (0=public, 1=private)
        webhookUrl:
          type: string
          format: uri
          nullable: true
          description: URL to receive webhook notifications for job status changes
          example: https://example.com/webhook

    CreateApiKeyRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Name/identifier for the API key
          example: user1
        description:
          type: string
          description: Optional description for the API key
          example: API key for production app

    CreateApiKeyResponse:
      type: object
      properties:
        api_key:
          type: string
          description: The full API key (only shown once at creation)
          example: datamio_abc123...
        key_id:
          type: string
          description: Unique identifier for the key
          example: a1b2c3d4
        name:
          type: string
          description: Name of the key
        key_prefix:
          type: string
          description: Prefix for identification (safe to display)
          example: datamio_abc1...
        message:
          type: string
          example: Store this API key securely. It will not be shown again.

    ApiKeyInfo:
      type: object
      properties:
        id:
          type: string
          description: Unique key identifier
        name:
          type: string
          description: Key name
        description:
          type: string
          description: Key description
        key_prefix:
          type: string
          description: Key prefix for identification
        created_at:
          type: string
          format: date-time
        last_used:
          type: string
          format: date-time
          nullable: true
        is_active:
          type: boolean
          description: Whether the key is active

    ApiKeyListResponse:
      type: object
      properties:
        keys:
          type: array
          items:
            $ref: '#/components/schemas/ApiKeyInfo'
        total:
          type: integer

    Segment:
      type: object
      properties:
        start:
          type: number
          format: float
          description: Start time in seconds
        end:
          type: number
          format: float
          description: End time in seconds
        url:
          type: string
          description: URL to the audio chunk
        text:
          type: string
          nullable: true
          description: Transcription text (only present when transcription is enabled)

    SplitsResponse:
      type: object
      properties:
        segments:
          type: array
          items:
            $ref: '#/components/schemas/Segment'
        count:
          type: integer
          description: Number of segments

    BatchSplitsResponse:
      type: object
      properties:
        results:
          type: object
          additionalProperties:
            type: object
            properties:
              segments:
                type: array
                items:
                  $ref: '#/components/schemas/Segment'
              count:
                type: integer
              status:
                type: string
                enum:
                  - success
                  - failed
              error:
                type: string
        total_files:
          type: integer

    SplitJobResponse:
      type: object
      properties:
        job_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - pending
            - downloading
            - splitting
            - transcribing
            - completed
            - failed
        message:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        progress:
          type: object
          nullable: true
        result:
          type: object
          nullable: true
        error:
          type: string
          nullable: true

    JobResponse:
      type: object
      properties:
        job_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - pending
            - downloading
            - uploading
            - completed
            - failed
        message:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        progress:
          type: object
          nullable: true
          properties:
            total_files:
              type: integer
            downloaded_files:
              type: integer
            uploaded:
              type: boolean
        result:
          type: object
          nullable: true
        error:
          type: string
          nullable: true

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: healthy
        total_hg_jobs:
          type: integer
          description: Number of Hugging Face upload jobs in memory
        total_split_jobs:
          type: integer
          description: Number of audio split jobs in memory

    ErrorResponse:
      type: object
      properties:
        detail:
          oneOf:
            - type: string
            - type: object
              properties:
                error:
                  type: string
                details:
                  type: string
                stack:
                  type: string

    MessageResponse:
      type: object
      properties:
        message:
          type: string

security:
  - ApiKeyAuth: []

paths:
  /:
    get:
      tags:
        - Health
      summary: Landing Page
      description: Serves the API landing page (HTML). No authentication required.
      operationId: landingPage
      security: []
      responses:
        '200':
          description: HTML landing page
          content:
            text/html:
              schema:
                type: string

  /api/health:
    get:
      tags:
        - Health
      summary: API Health Check
      description: Check API health and get job counts. No authentication required.
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/splits/file:
    post:
      tags:
        - Splits (Sync)
      summary: Split Single Audio File
      description: Split audio file by silence detection. Returns segments with chunk file paths.
      operationId: splitFile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SplitsRequest'
      responses:
        '200':
          description: Audio successfully split
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SplitsResponse'
        '401':
          description: API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Invalid or revoked API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Processing error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/splits/batch:
    post:
      tags:
        - Splits (Sync)
      summary: Split Multiple Audio Files
      description: Split multiple audio files by silence detection. Returns segments for each file.
      operationId: splitBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchSplitsRequest'
      responses:
        '200':
          description: Batch successfully processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchSplitsResponse'
        '401':
          description: API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Invalid or revoked API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Processing error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/splits/file/job:
    post:
      tags:
        - Splits (Async)
      summary: Create Split File Job
      description: Create an async job for splitting audio file. Returns immediately with job ID.
      operationId: createSplitFileJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SplitsRequest'
      responses:
        '200':
          description: Job created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SplitJobResponse'
        '401':
          description: API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Invalid or revoked API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Job creation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/splits/batch/job:
    post:
      tags:
        - Splits (Async)
      summary: Create Batch Split Job
      description: Create an async job for splitting multiple audio files. Returns immediately with job ID.
      operationId: createSplitBatchJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchSplitsRequest'
      responses:
        '200':
          description: Job created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SplitJobResponse'
        '401':
          description: API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Invalid or revoked API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Job creation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/splits/job/{job_id}:
    get:
      tags:
        - Splits (Async)
      summary: Get Split Job Status
      description: Get status of a specific split job
      operationId: getSplitJobStatus
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
          description: The job ID
      responses:
        '200':
          description: Job status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SplitJobResponse'
        '401':
          description: API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Invalid or revoked API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Splits (Async)
      summary: Delete Split Job
      description: Delete a split job from the database
      operationId: deleteSplitJob
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
          description: The job ID to delete
      responses:
        '200':
          description: Job deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Invalid or revoked API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/splits/jobs:
    get:
      tags:
        - Splits (Async)
      summary: Get All Split Jobs
      description: Get all split jobs for a user. **Requires admin API key.**
      operationId: getAllSplitJobs
      parameters:
        - name: user_id
          in: query
          required: false
          schema:
            type: string
            default: default
          description: User ID to filter jobs
      responses:
        '200':
          description: List of split jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SplitJobResponse'
        '401':
          description: API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Only admin can list all jobs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/upload-audio-dataset:
    post:
      tags:
        - Hugging Face
      summary: Upload Audio Dataset
      description: Create an upload job for audio dataset to Hugging Face. Returns immediately with job ID.
      operationId: uploadAudioDataset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadAudioDatasetRequest'
      responses:
        '200':
          description: Upload job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Invalid or revoked API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Job creation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/job/{job_id}:
    get:
      tags:
        - Hugging Face
      summary: Get Upload Job Status
      description: Get status of a specific upload job
      operationId: getJobStatus
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
          description: The job ID
      responses:
        '200':
          description: Job status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
        '401':
          description: API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Invalid or revoked API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Hugging Face
      summary: Delete Upload Job
      description: Delete an upload job from the database
      operationId: deleteJob
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
          description: The job ID to delete
      responses:
        '200':
          description: Job deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Invalid or revoked API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/jobs:
    get:
      tags:
        - Hugging Face
      summary: Get All Upload Jobs
      description: Get all upload jobs for a user. **Requires admin API key.**
      operationId: getAllJobs
      parameters:
        - name: user_id
          in: query
          required: false
          schema:
            type: string
            default: default
          description: User ID to filter jobs
      responses:
        '200':
          description: List of upload jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobResponse'
        '401':
          description: API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Only admin can list all jobs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/keys:
    post:
      tags:
        - API Key Management
      summary: Create API Key
      description: |
        Generate a new API key. **Requires admin API key.**

        The full API key is only returned once at creation time. Store it securely.
      operationId: createApiKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'
      responses:
        '200':
          description: API key created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateApiKeyResponse'
        '401':
          description: API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Only admin can generate new API keys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - API Key Management
      summary: List All API Keys
      description: List all API keys (without exposing the actual key values). **Requires admin API key.**
      operationId: listApiKeys
      responses:
        '200':
          description: List of API keys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyListResponse'
        '401':
          description: API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Only admin can list API keys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/keys/{key_id}:
    get:
      tags:
        - API Key Management
      summary: Get API Key Details
      description: Get details of a specific API key. **Requires admin API key.**
      operationId: getApiKey
      parameters:
        - name: key_id
          in: path
          required: true
          schema:
            type: string
          description: The API key ID
      responses:
        '200':
          description: API key details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyInfo'
        '401':
          description: API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Only admin can view API key details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: API key not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - API Key Management
      summary: Delete API Key
      description: Permanently delete an API key. **Requires admin API key.**
      operationId: deleteApiKey
      parameters:
        - name: key_id
          in: path
          required: true
          schema:
            type: string
          description: The API key ID to delete
      responses:
        '200':
          description: API key deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Only admin can delete API keys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: API key not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/keys/{key_id}/revoke:
    post:
      tags:
        - API Key Management
      summary: Revoke API Key
      description: Revoke (disable) an API key without permanently deleting it. **Requires admin API key.**
      operationId: revokeApiKey
      parameters:
        - name: key_id
          in: path
          required: true
          schema:
            type: string
          description: The API key ID to revoke
      responses:
        '200':
          description: API key revoked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: API key required
          content:
            application/json:
              schema:
